  <text x="728" y="146" fill="#F8FAFC" font-size="26" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">01 Observe user impact first</text>
  <text x="728" y="172" fill="#94A3B8" font-size="15" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Metrics, logs, and traces that show what users actually feel.</text>

  <text x="728" y="206" fill="#F8FAFC" font-size="26" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">02 Decide with the error budget</text>
  <text x="728" y="232" fill="#94A3B8" font-size="15" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Prefer small, reversible changes over large rollouts and intuition.</text>

  <text x="728" y="266" fill="#F8FAFC" font-size="26" font-weight="700" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">03 Automate before the next page</text>
  <text x="728" y="292" fill="#94A3B8" font-size="15" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">If the same work shows up twice, it is already asking to become code.</text>
